# קונפיגורציית Nginx ל-React App + Node.js Backend
# העתק קובץ זה ל: /etc/nginx/sites-available/zimmerspro

# HTTP to HTTPS Redirect
server {
    listen 80;
    listen [::]:80;
    server_name zimmerspro.message.co.il;

    # Redirect HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

# HTTPS Server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name zimmerspro.message.co.il;

    # SSL Certificate Configuration
    # לאחר הרצת certbot, השורות האלו יתעדכנו אוטומטית
    ssl_certificate /etc/letsencrypt/live/zimmerspro.message.co.il/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/zimmerspro.message.co.il/privkey.pem;
    
    # SSL Security Settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Gzip Compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript 
               application/x-javascript application/xml application/xml+rss 
               application/json application/javascript;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # ============================================
    # Uploaded Files - Serve Directly from Filesystem
    # ============================================
    # IMPORTANT: This MUST come before the root location block
    # Using exact match for /uploads/ to ensure highest priority
    location = /uploads {
        return 301 /uploads/;
    }
    
    # Serve files directly from filesystem (faster than proxy)
    # Make sure /var/www/zimmerspro/backend/uploads/ exists and is readable by nginx (www-data)
    location ^~ /uploads/ {
        alias /var/www/zimmerspro/backend/uploads/;
        
        # Don't use try_files with alias - it causes issues
        # Instead, let nginx serve the file directly or return 404
        
        # Cache uploaded files
        expires 30d;
        add_header Cache-Control "public, immutable";
        
        # Security: Don't allow directory listing
        autoindex off;
        access_log off;
        
        # Set proper content types for images
        types {
            image/jpeg jpg jpeg;
            image/png png;
            image/gif gif;
            image/webp webp;
            image/svg+xml svg;
            video/mp4 mp4;
            video/webm webm;
        }
        default_type application/octet-stream;
    }
    
    # OPTION 2: Serve via Node.js (fallback if direct serving doesn't work)
    # Uncomment this and comment out the location above if you have permission issues
    # location ^~ /uploads/ {
    #     proxy_pass http://localhost:3000;
    #     proxy_http_version 1.1;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    #     proxy_cache_valid 200 30d;
    #     expires 30d;
    #     add_header Cache-Control "public, immutable";
    #     access_log off;
    # }

    # ============================================
    # API Routes - Forward to Node.js Backend
    # ============================================
    location /api/ {
        proxy_pass http://localhost:3000;
        
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
        
        # No rewrite needed - proxy_pass with trailing slash preserves the path
    }

    # ============================================
    # React App - Serve Static Files
    # ============================================
    root /var/www/zimmerspro/dist;
    index index.html;

    # Serve React App with SPA routing support
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets (JS, CSS, Images, Fonts)
    # Note: /uploads/ files are handled by ^~ /uploads/ location above (higher priority)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Don't cache HTML files
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
